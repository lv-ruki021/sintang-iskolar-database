{% extends 'base.html' %}

{% block title %}Admin Login | Sintang Iskolar{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card" id="admin-login-card">
        <div class="auth-header">
            <i class="fa-solid fa-user-shield"></i>
            <h2>Admin Portal</h2>
            <p>Access the scholarship management dashboard</p>
        </div>
        <div class="auth-body">
            <form action="{{ url_for('admin_login') }}" method="POST" class="auth-form" id="admin-login-form">
                <div class="form-group">
                    <label for="username"><i class="fa-solid fa-user"></i> Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fa-solid fa-key"></i> Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn-auth-submit" id="btn-admin-submit">
                    Login <i class="fa-solid fa-right-to-bracket"></i>
                </button>
            </form>
        </div>
        <div class="auth-footer">
            <a href="{{ url_for('home') }}"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}
