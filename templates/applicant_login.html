{% extends 'base.html' %}

{% block title %}Track Application | Sintang Iskolar{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card" id="applicant-login-card">
        <div class="auth-header">
            <i class="fa-solid fa-graduation-cap"></i>
            <h2>Track Application</h2>
            <p>Log in with your details to manage your application</p>
        </div>
        <div class="auth-body">
            <form action="{{ url_for('applicant_login') }}" method="POST" class="auth-form" id="applicant-login-form">
                <div class="form-group">
                    <label for="student_id"><i class="fa-solid fa-id-card"></i> Student ID</label>
                    <input type="text" id="student_id" name="student_id" placeholder="e.g. 2025-01234-MN-0" required autofocus>
                </div>
                <div class="form-group">
                    <label for="email"><i class="fa-regular fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" name="email" placeholder="e.g. student@domain.com" required>
                </div>
                <button type="submit" class="btn-auth-submit" id="btn-applicant-submit">
                    Access Portal <i class="fa-solid fa-unlock-keyhole"></i>
                </button>
            </form>
        </div>
        <div class="auth-footer">
            <a href="{{ url_for('home') }}"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}
